name: Auto Update M3U Playlist

on:
  schedule:
    - cron: "0 */3 * * *" # Tự động chạy mỗi 3 tiếng
  workflow_dispatch:      # Cung cấp nút bấm chạy thủ công trên GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Bắt buộc để Actions có quyền ghi file lên kho của bạn

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Crawler
        run: python crawler.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Lệnh *.m3u sẽ tự động tóm gọn cả 4 file phim lẻ, phim bộ, hoạt hình, tv shows
          git add movies_database.json *.m3u
          git commit -m "Auto update and categorize movies playlist" || echo "No changes to commit"
          git push
