name: Auto Update M3U Playlist

on:
  schedule:
    - cron: "0 */3 * * *" # Tự động chạy mỗi 3 tiếng
  workflow_dispatch:      # Nút bấm chạy thủ công trên GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Bắt buộc phải có để Actions được phép lưu file

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Crawler
        run: python crawler.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add movies_database.json plugins.json *.m3u
          git commit -m "Auto update database, m3u and plugins" || echo "No changes to commit"
          git push
