name: Auto Update M3U Playlist

on:
  schedule:
    - cron: "*/30 * * * *" # Tự động chạy mỗi 30 phút
  workflow_dispatch:      # Nút bấm chạy thủ công

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Crawler
        run: python crawler.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Đảm bảo add tất cả các file .json và .m3u đã được crawler cập nhật
          git add movies_database.json *.m3u
          git commit -m "Auto update movies database and all playlists" || echo "No changes to commit"
          git push
